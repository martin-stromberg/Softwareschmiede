name: Release & Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: write

# Verhindert parallele Release-Laeufe (z. B. schneller Merge nach main + manueller Tag-Push
# kurz danach): Der Release-Job berechnet die naechste Version aus dem zuletzt existierenden
# Tag und erstellt danach Tag/Release ueber die GitHub-API - ohne Serialisierung droht ein
# Wettlauf mit doppelt vergebenen Versionen oder fehlschlagenden Release-Erstellungen.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Normalfall: Push/Merge auf main. Semantic Release wertet die Commits seit dem letzten
  # Tag per Dry-Run aus und bestimmt die naechste Version. Tag/Release werden anschliessend
  # per GitHub-API erstellt, damit der geschuetzte main-Branch nicht direkt beschrieben wird.
  release:
    if: startsWith(github.ref, 'refs/heads/')
    # Softwareschmiede.App ist eine WPF-Anwendung (net10.0-windows, UseWPF=true) und kann
    # nur auf einem Windows-Runner gebaut und publiziert werden.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Determine next release version
        id: release_version
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $semanticReleaseOutput = & npx semantic-release --dry-run --no-ci 2>&1
          $exitCode = $LASTEXITCODE
          $output = $semanticReleaseOutput | Out-String

          Write-Host "semantic-release exit code: $exitCode"
          Write-Host $output

          $version = $null
          $shouldRelease = $false
          if ($output -match 'The next release version is ([0-9]+\.[0-9]+\.[0-9]+(?:[-+][^\s]+)?)') {
            $version = $Matches[1]
            $shouldRelease = $true
          }
          if (-not $version) {
            try {
              $package = Get-Content package.json -Raw | ConvertFrom-Json
              $version = $package.version
            }
            catch {
              Write-Host "Could not read package.json: $($_.Exception.Message)"
              $version = "0.0.0"
            }
          }
          Write-Host "Determined version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "should_release=$($shouldRelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Build and package
        if: steps.release_version.outputs.should_release == 'true'
        uses: ./.github/actions/build-and-package
        with:
          release-version: ${{ steps.release_version.outputs.version }}
          release-tag: ${{ steps.release_version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.release_version.outputs.should_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release_version.outputs.tag }}"
          gh release create $tag release.zip `
            --target $env:GITHUB_SHA `
            --title $tag `
            --generate-notes

  # Manueller Override: Ein Tag im Format vX.Y.Z wurde bewusst gepusht (git tag vX.Y.Z && git push origin vX.Y.Z).
  # Ein Tag-Push loest keinen "push: branches: [main]"-Trigger aus, daher baut dieser eigene Job
  # Release Notes, Release und ZIP-Upload direkt fuer den gepushten Tag - unabhaengig von Commit-Typen
  # und ohne semantic-release-Versionsberechnung.
  release-manual-tag:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and package
        uses: ./.github/actions/build-and-package
        with:
          release-version: ${{ github.ref_name }}
          release-tag: ${{ github.ref_name }}

      - name: Create GitHub Release for manual tag
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
