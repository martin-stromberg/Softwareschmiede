name: Tests

# Bisher gab es keine CI-Pipeline, die "dotnet test" ausfuehrt - release.yml baut/published/released
# nur (siehe dortige Kommentare). Ohne diesen Job war die gesamte Testsuite ausschliesslich durch
# gelegentliche manuelle Laeufe abgesichert.
on:
  # Nur "push" auf main (Merge-Nachkontrolle) + "pull_request" fuer Feature-Branches - nicht beides
  # fuer denselben Branch, sonst laeuft die ~13-Minuten-Suite doppelt: jeder Push auf einen Branch
  # mit offenem PR loest sowohl "push" als auch "pull_request: synchronize" aus.
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Softwareschmiede.Tests referenziert Softwareschmiede.App (WPF, net10.0-windows),
    # deshalb bleibt der stabile CI-Testlauf trotz E2E-Ausschluss auf Windows.
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        shell: pwsh

      - name: Build
        run: dotnet build src/Softwareschmiede.Tests/Softwareschmiede.Tests.csproj --no-restore -c Debug
        shell: pwsh

      - name: Test
        # PR-Gate: nur stabile Unit-/Integrations-/BUnit-nahe Tests. WPF/FlaUI-E2E und echte
        # ConPTY-Umgebungstests laufen lokal waehrend der Entwicklung, weil GitHub-hosted Runner
        # keine verlaessliche interaktive Desktop-/Konsolen-Session bereitstellen.
        run: dotnet test src/Softwareschmiede.Tests/Softwareschmiede.Tests.csproj --no-build -c Debug --filter "Category!=E2E&Category!=ConPTY" --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal"
        shell: pwsh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/Softwareschmiede.Tests/TestResults/*.trx
          retention-days: 14
