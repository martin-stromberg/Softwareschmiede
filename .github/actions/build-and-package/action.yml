name: Build and package
description: >
  Stellt das .NET-10-SDK bereit, restored, published die Softwareschmiede.App (WPF)
  im Release-Modus und packt das Ergebnis als release.zip. Wird von den Jobs `release`
  und `release-manual-tag` in release.yml gemeinsam genutzt, um Divergenz zwischen
  den identischen Build-Schritten zu vermeiden.

inputs:
  release-version:
    description: Version ohne fuehrendes v, die in version.json geschrieben wird.
    required: false
    default: ''
  release-tag:
    description: Release-Tag, der in version.json geschrieben wird.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore
      shell: pwsh

    - name: Publish
      run: dotnet publish src/Softwareschmiede.App/Softwareschmiede.App.csproj -c Release -o publish/
      shell: pwsh

    - name: Rename executable for release
      # Der Dev-/Test-Build (bin/Debug/.../Softwareschmiede.App.exe) und veroeffentlichte Releases
      # sollen unterschiedliche Prozessnamen tragen: Diese Anwendung wird mit sich selbst
      # weiterentwickelt (eine installierte Release-Kopie hostet haeufig die laufende
      # Claude-Code-Session). Teilen sich Dev-Build und Release denselben Namen, kann
      # Tooling (Build-Lock-Aufloesung, Testaufraeumen, taskkill-artige Logik), das nach
      # "Softwareschmiede.App.exe" sucht, versehentlich die Release-/Host-Instanz statt einer
      # verwaisten Testinstanz treffen. Der Rename passiert bewusst erst hier im Publish-Schritt,
      # nicht ueber <AssemblyName> im csproj, damit der lokale Dev-Build unveraendert bleibt.
      run: Rename-Item -Path 'publish/Softwareschmiede.App.exe' -NewName 'Softwareschmiede.exe'
      shell: pwsh

    - name: Write version manifest
      env:
        RELEASE_VERSION: ${{ inputs.release-version }}
        RELEASE_TAG: ${{ inputs.release-tag }}
      run: |
        $version = $env:RELEASE_VERSION
        $tagName = $env:RELEASE_TAG
        if (-not $tagName) {
          $tagName = "v0.0.0"
        }
        if (-not $version) {
          $version = $tagName -replace '^v', ''
        }
        $version = $version -replace '^v', ''
        $manifest = [ordered]@{
          version = $version
          tagName = $tagName
          commit = $env:GITHUB_SHA
          createdAtUtc = (Get-Date).ToUniversalTime().ToString('o')
        }
        $manifest | ConvertTo-Json -Depth 3 | Set-Content -Path 'publish/version.json' -Encoding UTF8
      shell: pwsh

    - name: Verify publish output
      run: |
        if (-not (Test-Path 'publish/Softwareschmiede.exe')) {
          throw "publish/ ist unvollstaendig: Softwareschmiede.exe fehlt."
        }
        if (-not (Test-Path 'publish/version.json')) {
          throw "publish/ ist unvollstaendig: version.json fehlt."
        }
        $pluginDlls = Get-ChildItem -Path 'publish/plugins' -Filter '*.dll' -Recurse -ErrorAction SilentlyContinue
        if (-not $pluginDlls -or $pluginDlls.Count -eq 0) {
          throw "publish/plugins enthaelt keine Plugin-DLLs."
        }
      shell: pwsh

    - name: Create Release ZIP
      run: Compress-Archive -Path publish/* -DestinationPath release.zip -Force
      shell: pwsh
